<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Built Environment Sustainability — R&D Ecosystem Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--ink:#0f1a12;--paper:#f5f4ef;--sage:#3d6b4f;--sage-light:#5a8c6a;--sage-pale:#e8f0ea;--amber:#c17f2a;--amber-pale:#fdf3e3;--rust:#b84a2e;--rust-pale:#fbeae6;--slate:#4a5568;--rule:#d4d0c8;--card:#ffffff;--tag:#edf2ee}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
/* HEADER */
header{background:var(--ink);color:var(--paper);padding:2rem 2.5rem 1.75rem;border-bottom:3px solid var(--sage)}
.h-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.eyebrow{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-light);margin-bottom:.5rem}
header h1{font-size:clamp(1.4rem,3vw,2rem);font-weight:700;line-height:1.2}
header h1 span{color:var(--sage-light)}
.h-meta{font-size:.8rem;color:#9aaa9d;margin-top:.5rem}
.stat-pills{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1.25rem}
.stat-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:100px;padding:.3rem .85rem;font-size:.75rem;font-family:'DM Mono',monospace}
.stat-pill b{color:var(--sage-light)}
/* VIEW TOGGLE */
.view-toggle{display:flex;gap:.3rem;align-self:flex-start;margin-top:.5rem}
.view-btn{padding:.4rem .6rem;border:1.5px solid rgba(255,255,255,.2);border-radius:6px;background:transparent;cursor:pointer;color:var(--paper);font-size:.8rem;transition:all .15s}
.view-btn.active{background:var(--sage);border-color:var(--sage)}
/* CONTROLS */
.controls{background:var(--card);border-bottom:1px solid var(--rule);padding:1.25rem 2.5rem;display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ctrl{display:flex;flex-direction:column;gap:.35rem;min-width:140px}
.ctrl label{font-size:.68rem;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--slate)}
.ctrl select,.ctrl input{font-family:'DM Sans',sans-serif;font-size:.82rem;border:1.5px solid var(--rule);border-radius:6px;padding:.45rem .7rem;background:var(--paper);color:var(--ink);appearance:none;cursor:pointer;transition:border-color .15s}
.ctrl select:focus,.ctrl input:focus{outline:none;border-color:var(--sage)}
.ctrl.search{flex:1;min-width:200px}
.ctrl.search input{width:100%}
.rcount{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--slate);align-self:center;white-space:nowrap;margin-left:auto}
/* PILL BARS */
.pill-bar{padding:1rem 2.5rem .75rem;overflow-x:auto}
.pill-bar.topics{background:var(--sage-pale);border-bottom:1px solid #c8d9cc}
.pill-bar.domains{background:var(--amber-pale);border-bottom:1px solid var(--rule)}
.pill-bar-label{font-size:.68rem;font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.6rem}
.pill-bar.topics .pill-bar-label{color:var(--sage)}
.pill-bar.domains .pill-bar-label{color:var(--amber)}
.pills{display:flex;gap:.5rem;flex-wrap:nowrap;min-width:max-content}
.pill{font-size:.73rem;padding:.28rem .7rem;border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;background:transparent}
.pill.topic{border:1.5px solid var(--sage);color:var(--sage)}
.pill.topic:hover,.pill.topic.active{background:var(--sage);color:#fff}
.pill.domain{border:1.5px solid var(--amber);color:var(--amber)}
.pill.domain:hover,.pill.domain.active{background:var(--amber);color:#fff}
/* ACTIVE FILTERS */
.af{padding:.6rem 2.5rem;background:var(--card);border-bottom:1px solid var(--rule);display:none;gap:.4rem;flex-wrap:wrap;align-items:center}
.af.on{display:flex}
.af-label{font-size:.68rem;font-family:'DM Mono',monospace;color:var(--slate);text-transform:uppercase;letter-spacing:.08em}
.ftag{font-size:.72rem;padding:.2rem .6rem;border-radius:100px;background:var(--ink);color:#fff;display:flex;align-items:center;gap:.3rem;cursor:pointer}
.clear-all{font-size:.72rem;color:var(--rust);cursor:pointer;text-decoration:underline;margin-left:.3rem}
/* GRID */
.grid-wrap{padding:1.75rem 2.5rem}
.cat-section{margin-bottom:2.5rem}
.cat-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:2px solid var(--ink)}
.cat-label{font-size:.68rem;font-family:'DM Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--slate)}
.cat-name{font-size:1.1rem;font-weight:700}
.cat-count{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--slate);margin-left:auto}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem}
/* CARD */
.card{background:var(--card);border:1.5px solid var(--rule);border-radius:10px;padding:1.1rem 1.2rem;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden}
.card:hover{border-color:var(--sage);box-shadow:0 4px 16px rgba(61,107,79,.1)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rule);transition:background .15s}
.card:hover::before{background:var(--sage)}
.card[data-geo="India"]::before{background:var(--amber)}
.card[data-geo="Both"]::before{background:linear-gradient(90deg,var(--sage),var(--amber))}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.6rem}
.card-name{font-size:.95rem;font-weight:700;line-height:1.3;flex:1}
.geo-badge{font-size:.63rem;font-family:'DM Mono',monospace;letter-spacing:.06em;padding:.18rem .55rem;border-radius:100px;white-space:nowrap;flex-shrink:0}
.geo-badge.Global{background:var(--sage-pale);color:var(--sage);border:1px solid #c0d8c8}
.geo-badge.India{background:var(--amber-pale);color:var(--amber);border:1px solid #e8d0a0}
.geo-badge.Both{background:#f0eaf5;color:#7c4fa0;border:1px solid #d4c0e0}
.card-focus{font-size:.78rem;color:var(--slate);line-height:1.5;margin-bottom:.75rem}
.card-domains{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem}
.dtag{font-size:.65rem;padding:.2rem .5rem;border-radius:4px;background:var(--tag);color:var(--slate);border:1px solid var(--rule);font-family:'DM Mono',monospace}
.card-metrics{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.85rem}
.mbadge{font-size:.63rem;padding:.2rem .55rem;border-radius:4px;font-family:'DM Mono',monospace;border:1px solid}
.mbadge.ih{background:#e8f5ec;color:#1a5c35;border-color:#b8dfc4}
.mbadge.im{background:var(--amber-pale);color:var(--amber);border-color:#e8d0a0}
.mbadge.il{background:#f0f0f0;color:#888;border-color:#ddd}
.mbadge.my{background:#e8f5ec;color:#1a5c35;border-color:#b8dfc4}
.mbadge.mp{background:var(--amber-pale);color:#8a5a00;border-color:#e8d0a0}
.mbadge.mn{background:var(--rust-pale);color:#8a1a00;border-color:#f0c0b4}
.mbadge.rd{background:var(--sage-pale);color:var(--sage);border-color:#c0d8c8}
.mbadge.rdu{background:#f0f0f0;color:#888;border-color:#ddd}
.card-url{display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;font-family:'DM Mono',monospace;color:var(--sage);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .12s}
.card-url:hover{border-color:var(--sage)}
.card-url svg{width:11px;height:11px;flex-shrink:0}
.expand-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;font-size:.7rem;color:var(--slate);padding:.5rem 0 0;border-top:1px solid var(--rule);margin-top:.6rem;font-family:'DM Sans',sans-serif;display:flex;justify-content:space-between}
.card-detail{display:none;padding-top:.75rem}
.card-detail.open{display:block}
.dl{margin-bottom:.6rem}
.dl-label{font-size:.65rem;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);margin-bottom:.2rem}
.dl-val{font-size:.78rem;line-height:1.5;color:var(--ink)}
.insight{background:var(--sage-pale);border-left:3px solid var(--sage);padding:.6rem .75rem;border-radius:0 6px 6px 0;margin-top:.6rem;font-size:.78rem;line-height:1.5;color:var(--sage);font-style:italic}
/* EMPTY */
.empty{text-align:center;padding:4rem 2rem;color:var(--slate)}
.empty h3{font-size:1.1rem;margin-bottom:.5rem}
/* TABLE */
.tbl-wrap{padding:0 2.5rem 2rem;overflow-x:auto;display:none}
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead th{background:var(--ink);color:var(--paper);padding:.6rem .75rem;text-align:left;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{background:var(--sage)}
tbody tr{border-bottom:1px solid var(--rule);transition:background .1s}
tbody tr:hover{background:var(--sage-pale)}
tbody td{padding:.55rem .75rem;vertical-align:top}
.tbl-name{font-weight:600;white-space:nowrap}
.tbl-focus{max-width:240px;color:var(--slate)}
.tbl-link{color:var(--sage);font-family:'DM Mono',monospace;white-space:nowrap;text-decoration:none}
.tbl-link:hover{text-decoration:underline}
@media(max-width:768px){header,.controls,.pill-bar,.af,.grid-wrap,.tbl-wrap{padding-left:1.25rem;padding-right:1.25rem}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="h-top">
    <div>
      <div class="eyebrow">SD+ R&D Intelligence</div>
      <h1>Built Environment Sustainability<br><span>R&D Ecosystem Explorer</span></h1>
      <div class="h-meta" id="h-meta">Loading…</div>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Card view">⊞</button>
      <button class="view-btn" id="btn-table" onclick="setView('table')" title="Table view">☰</button>
    </div>
  </div>
  <div class="stat-pills" id="stat-pills"></div>
</header>

<div class="controls">
  <div class="ctrl search">
    <label>Search</label>
    <input type="text" id="search" placeholder="Name, topic, tool, institution…" oninput="applyFilters()">
  </div>
  <div class="ctrl">
    <label>Category</label>
    <select id="f-cat" onchange="applyFilters()">
      <option value="">All categories</option>
      <option>Tech Product</option>
      <option>Architecture Firm</option>
      <option>Research Institution</option>
    </select>
  </div>
  <div class="ctrl">
    <label>Geography</label>
    <select id="f-geo" onchange="applyFilters()">
      <option value="">All geographies</option>
      <option>India</option>
      <option>Global</option>
      <option>Both</option>
    </select>
  </div>
  <div class="ctrl">
    <label>India Relevance</label>
    <select id="f-india" onchange="applyFilters()">
      <option value="">Any</option>
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>
  </div>
  <div class="ctrl">
    <label>Moat</label>
    <select id="f-moat" onchange="applyFilters()">
      <option value="">Any moat</option>
      <option>Yes</option>
      <option>Partial</option>
      <option>No</option>
    </select>
  </div>
  <div class="ctrl">
    <label>Has R&D?</label>
    <select id="f-rd" onchange="applyFilters()">
      <option value="">Any</option>
      <option>Yes</option>
      <option>Partially</option>
      <option>Unclear</option>
      <option>No</option>
    </select>
  </div>
  <div class="ctrl">
    <label>Sort by</label>
    <select id="f-sort" onchange="applyFilters()">
      <option value="name">Name A–Z</option>
      <option value="india">India Relevance ↑</option>
      <option value="moat">Moat strength</option>
      <option value="cat">Category</option>
      <option value="geo">Geography</option>
    </select>
  </div>
  <div class="rcount" id="rcount"></div>
</div>

<div class="pill-bar topics">
  <div class="pill-bar-label">Filter by Research Topic</div>
  <div class="pills" id="topic-pills"></div>
</div>
<div class="pill-bar domains">
  <div class="pill-bar-label">Filter by Sustainability Domain</div>
  <div class="pills" id="domain-pills"></div>
</div>

<div class="af" id="af">
  <span class="af-label">Active:</span>
  <span id="ftags"></span>
  <span class="clear-all" onclick="clearAll()">Clear all</span>
</div>

<div id="grid-view"><div class="grid-wrap" id="grid"></div></div>
<div class="tbl-wrap" id="tbl-view">
  <table>
    <thead><tr>
      <th onclick="sortTbl('Entity_Name')">Entity ↕</th>
      <th onclick="sortTbl('Category')">Category ↕</th>
      <th onclick="sortTbl('Geography')">Geo ↕</th>
      <th>Focus</th>
      <th onclick="sortTbl('India_Relevance')">India Rel. ↕</th>
      <th onclick="sortTbl('Competitive_Moat')">Moat ↕</th>
      <th onclick="sortTbl('Has_RD_Function')">R&D ↕</th>
      <th>Domains</th>
      <th>Website</th>
    </tr></thead>
    <tbody id="tbl-body"></tbody>
  </table>
</div>

"No", "Key_Insight_for_SD+": "Adjacent finance layer — less directly relevant; flag only if SD+ moves into carbon credit integration for Indian projects"}];

let activeTopics = new Set();
let activeDomains = new Set();
let currentView = 'grid';
let tblSort = null, tblDir = 1;
let filterActions = [];

const allTopics = [...new Set(DATA.flatMap(d => d.Research_Topics.split(',').map(t=>t.trim()).filter(Boolean)))].sort();
const allDomains = [...new Set(DATA.flatMap(d => d.Sustainability_Domains.split(';').map(t=>t.trim()).filter(Boolean)))].sort();

function init(){
  const cats={};
  DATA.forEach(d=>{cats[d.Category]=(cats[d.Category]||0)+1});
  document.getElementById('h-meta').textContent = `${DATA.length} entities · Tech Products, Architecture Firms & Research Institutions · Global + India`;
  const sp=document.getElementById('stat-pills');
  sp.innerHTML=`<span class="stat-pill">Total <b>${DATA.length}</b></span>`
    +Object.entries(cats).map(([k,v])=>`<span class="stat-pill">${k}s <b>${v}</b></span>`).join('')
    +`<span class="stat-pill">India Geo <b>${DATA.filter(d=>d.Geography==='India').length}</b></span>`
    +`<span class="stat-pill">High India Rel. <b>${DATA.filter(d=>d.India_Relevance==='High').length}</b></span>`;

  document.getElementById('topic-pills').innerHTML = allTopics.map((t,i)=>
    `<button class="pill topic" data-t="${t.replace(/"/g,'&quot;')}" onclick="toggleTopic(${i},this)">${t}</button>`
  ).join('');
  document.getElementById('domain-pills').innerHTML = allDomains.map((d,i)=>
    `<button class="pill domain" data-d="${d.replace(/"/g,'&quot;')}" onclick="toggleDomain(${i},this)">${d}</button>`
  ).join('');
  applyFilters();
}

function toggleTopic(i,el){
  const t=el.getAttribute('data-t');
  if(activeTopics.has(t)){activeTopics.delete(t);el.classList.remove('active')}
  else{activeTopics.add(t);el.classList.add('active')}
  applyFilters();
}
function toggleDomain(i,el){
  const d=el.getAttribute('data-d');
  if(activeDomains.has(d)){activeDomains.delete(d);el.classList.remove('active')}
  else{activeDomains.add(d);el.classList.add('active')}
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('f-cat').value;
  const geo=document.getElementById('f-geo').value;
  const india=document.getElementById('f-india').value;
  const moat=document.getElementById('f-moat').value;
  const rd=document.getElementById('f-rd').value;
  const sort=document.getElementById('f-sort').value;

  let filtered=DATA.filter(d=>{
    if(cat&&d.Category!==cat)return false;
    if(geo&&d.Geography!==geo)return false;
    if(india&&d.India_Relevance!==india)return false;
    if(moat&&d.Competitive_Moat!==moat)return false;
    if(rd&&d.Has_RD_Function!==rd)return false;
    if(activeTopics.size>0){const t=d.Research_Topics.toLowerCase();if(![...activeTopics].some(x=>t.includes(x.toLowerCase())))return false}
    if(activeDomains.size>0){const dm=d.Sustainability_Domains.toLowerCase();if(![...activeDomains].some(x=>dm.includes(x.toLowerCase())))return false}
    if(q){const blob=Object.values(d).join(' ').toLowerCase();if(!blob.includes(q))return false}
    return true;
  });

  const mo={Yes:0,Partial:1,No:2,Unclear:3,Partially:2};
  const ro={High:0,Medium:1,Low:2,Unclear:3};
  filtered.sort((a,b)=>{
    if(sort==='name')return a.Entity_Name.localeCompare(b.Entity_Name);
    if(sort==='india')return ro[a.India_Relevance]-ro[b.India_Relevance];
    if(sort==='moat')return mo[a.Competitive_Moat]-mo[b.Competitive_Moat];
    if(sort==='cat')return a.Category.localeCompare(b.Category)||a.Entity_Name.localeCompare(b.Entity_Name);
    if(sort==='geo')return a.Geography.localeCompare(b.Geography)||a.Entity_Name.localeCompare(b.Entity_Name);
    return 0;
  });

  document.getElementById('rcount').textContent=`${filtered.length} of ${DATA.length}`;
  updateAF(q,cat,geo,india,moat,rd);
  if(currentView==='grid')renderGrid(filtered);else renderTable(filtered);
}

function updateAF(q,cat,geo,india,moat,rd){
  const tags=[];
  if(q)tags.push({l:`"${q}"`,c:()=>{document.getElementById('search').value='';applyFilters()}});
  if(cat)tags.push({l:cat,c:()=>{document.getElementById('f-cat').value='';applyFilters()}});
  if(geo)tags.push({l:geo,c:()=>{document.getElementById('f-geo').value='';applyFilters()}});
  if(india)tags.push({l:`India:${india}`,c:()=>{document.getElementById('f-india').value='';applyFilters()}});
  if(moat)tags.push({l:`Moat:${moat}`,c:()=>{document.getElementById('f-moat').value='';applyFilters()}});
  if(rd)tags.push({l:`R&D:${rd}`,c:()=>{document.getElementById('f-rd').value='';applyFilters()}});
  activeTopics.forEach(t=>tags.push({l:`Topic:${t}`,c:()=>{activeTopics.delete(t);document.querySelectorAll('.pill.topic').forEach(el=>{if(el.getAttribute('data-t')===t)el.classList.remove('active')});applyFilters()}}));
  activeDomains.forEach(d=>tags.push({l:`Domain:${d}`,c:()=>{activeDomains.delete(d);document.querySelectorAll('.pill.domain').forEach(el=>{if(el.getAttribute('data-d')===d)el.classList.remove('active')});applyFilters()}}));
  const af=document.getElementById('af');
  filterActions=tags.map(t=>t.c);
  if(tags.length){
    af.classList.add('on');
    document.getElementById('ftags').innerHTML=tags.map((t,i)=>`<span class="ftag" onclick="filterActions[${i}]()">${t.l} <span>×</span></span>`).join('');
  }else af.classList.remove('on');
}

function clearAll(){
  ['search','f-cat','f-geo','f-india','f-moat','f-rd'].forEach(id=>{const el=document.getElementById(id);if(el.tagName==='INPUT')el.value='';else el.value='';});
  activeTopics.clear();activeDomains.clear();
  document.querySelectorAll('.pill.active').forEach(el=>el.classList.remove('active'));
  applyFilters();
}

function renderGrid(data){
  const g=document.getElementById('grid');
  if(!data.length){g.innerHTML='<div class="empty"><h3>No entities match</h3><p>Try adjusting your filters.</p></div>';return}
  const groups={};
  data.forEach(d=>{(groups[d.Category]=groups[d.Category]||[]).push(d)});
  const order=['Tech Product','Architecture Firm','Research Institution'];
  g.innerHTML=order.filter(c=>groups[c]).map(cat=>{
    return`<div class="cat-section">
      <div class="cat-header">
        <div><div class="cat-label">Category</div><div class="cat-name">${cat}s</div></div>
        <div class="cat-count">${groups[cat].length} entities</div>
      </div>
      <div class="cards">${groups[cat].map(renderCard).join('')}</div>
    </div>`;
  }).join('');
}

function renderCard(d){
  const url=d.Website&&d.Website!=='Unconfirmed'?(d.Website.startsWith('http')?d.Website:'https://'+d.Website):null;
  const doms=d.Sustainability_Domains.split(';').map(s=>s.trim()).filter(Boolean);
  const ir=d.India_Relevance.toLowerCase();
  const mc=d.Competitive_Moat;
  const rdv=d.Has_RD_Function;
  const id='c_'+d.Entity_Name.replace(/[^a-z0-9]/gi,'_');
  const rdClass=rdv==='Yes'?'rd':rdv==='Partially'?'rd':'rdu';
  const rdLabel=rdv==='Yes'?'R&D ✓':rdv==='Partially'?'R&D ~':'R&D ?';
  return`<div class="card" data-geo="${d.Geography}">
    <div class="card-top">
      <div class="card-name">${d.Entity_Name}</div>
      <span class="geo-badge ${d.Geography}">${d.Geography}</span>
    </div>
    <div class="card-focus">${d.Core_Product_or_Focus}</div>
    <div class="card-domains">${doms.slice(0,4).map(dm=>`<span class="dtag">${dm}</span>`).join('')}${doms.length>4?`<span class="dtag">+${doms.length-4}</span>`:''}</div>
    <div class="card-metrics">
      <span class="mbadge i${ir.charAt(0)}">India: ${d.India_Relevance}</span>
      <span class="mbadge m${mc==='Yes'?'y':mc==='Partial'?'p':'n'}">Moat: ${mc}</span>
      <span class="mbadge ${rdClass}">${rdLabel}</span>
    </div>
    ${url?`<a class="card-url" href="${url}" target="_blank" rel="noopener"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 1H1v10h10V7M7 1h4v4M4 8l7-7"/></svg>${d.Website}</a>`:`<span style="font-size:.72rem;color:#bbb;font-family:monospace">No verified URL</span>`}
    <button class="expand-btn" onclick="toggle('${id}',this)"><span>Research details & SD+ insight</span><span>▾</span></button>
    <div class="card-detail" id="${id}">
      ${d.RD_Team_or_Lab_Name&&d.RD_Team_or_Lab_Name!=='Unclear'?`<div class="dl"><div class="dl-label">R&D Team / Lab</div><div class="dl-val">${d.RD_Team_or_Lab_Name}</div></div>`:''}
      ${d.Research_Topics?`<div class="dl"><div class="dl-label">Research Topics</div><div class="dl-val">${d.Research_Topics}</div></div>`:''}
      ${d.Research_Output_Type?`<div class="dl"><div class="dl-label">Output Type</div><div class="dl-val">${d.Research_Output_Type}</div></div>`:''}
      ${d.Notable_Publications_or_Tools&&d.Notable_Publications_or_Tools!=='Unclear'?`<div class="dl"><div class="dl-label">Notable Outputs</div><div class="dl-val">${d.Notable_Publications_or_Tools}</div></div>`:''}
      ${d['Key_Insight_for_SD+']?`<div class="insight">💡 ${d['Key_Insight_for_SD+']}</div>`:''}
    </div>
  </div>`;
}

function toggle(id,btn){
  const el=document.getElementById(id);
  el.classList.toggle('open');
  btn.querySelector('span:last-child').textContent=el.classList.contains('open')?'▴':'▾';
}

function renderTable(data){
  const mo={Yes:0,Partial:1,No:2,Unclear:3};
  const ro={High:0,Medium:1,Low:2};
  if(tblSort){
    data=data.slice().sort((a,b)=>{
      let av=a[tblSort]||'',bv=b[tblSort]||'';
      if(tblSort==='India_Relevance'){av=ro[av]??9;bv=ro[bv]??9;return(av-bv)*tblDir}
      if(tblSort==='Competitive_Moat'){av=mo[av]??9;bv=mo[bv]??9;return(av-bv)*tblDir}
      return av.localeCompare(bv)*tblDir;
    });
  }
  const mc={Yes:'#1a5c35',Partial:'#8a5a00',No:'#8a1a00'};
  const rc={High:'#1a5c35',Medium:'#c17f2a',Low:'#888'};
  document.getElementById('tbl-body').innerHTML=data.map(d=>{
    const url=d.Website&&d.Website!=='Unconfirmed'?(d.Website.startsWith('http')?d.Website:'https://'+d.Website):null;
    const doms=d.Sustainability_Domains.split(';').map(s=>s.trim()).filter(Boolean).slice(0,3).join(', ');
    return`<tr>
      <td class="tbl-name">${d.Entity_Name}</td>
      <td><span style="font-size:.7rem;padding:.15rem .45rem;background:#f0f0f0;border-radius:4px">${d.Category}</span></td>
      <td><span class="geo-badge ${d.Geography}" style="font-size:.65rem">${d.Geography}</span></td>
      <td class="tbl-focus">${d.Core_Product_or_Focus.slice(0,110)}${d.Core_Product_or_Focus.length>110?'…':''}</td>
      <td style="color:${rc[d.India_Relevance]||'#888'};font-weight:600;font-size:.75rem">${d.India_Relevance}</td>
      <td style="color:${mc[d.Competitive_Moat]||'#888'};font-weight:600;font-size:.75rem">${d.Competitive_Moat}</td>
      <td style="font-size:.75rem;font-weight:600;color:${d.Has_RD_Function==='Yes'?'#1a5c35':d.Has_RD_Function==='Unclear'?'#888':'#c17f2a'}">${d.Has_RD_Function}</td>
      <td style="font-size:.72rem;color:#555">${doms}</td>
      <td>${url?`<a class="tbl-link" href="${url}" target="_blank" rel="noopener">${d.Website.replace(/^https?:\/\//,'')}</a>`:'<span style="color:#bbb">—</span>'}</td>
    </tr>`;
  }).join('');
}

function sortTbl(col){
  if(tblSort===col)tblDir*=-1;else{tblSort=col;tblDir=1}
  applyFilters();
}

function setView(v){
  currentView=v;
  document.getElementById('grid-view').style.display=v==='grid'?'':'none';
  document.getElementById('tbl-view').style.display=v==='table'?'block':'none';
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-table').classList.toggle('active',v==='table');
  applyFilters();
}

init();
</script>
